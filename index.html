    .sidebar-hover-group {

    /* Hide text labels + header text when collapsed */
    .sidebar-label,
    .sidebar-header-text,
    .sidebar-toggle-btn {
      opacity: 0;
      white-space: nowrap;
      transition: opacity 0.15s ease;
      pointer-events: none;

    .sidebar-hover-group:hover .sidebar-label,
    .sidebar-hover-group:hover .sidebar-header-text,
    .sidebar-hover-group:hover .sidebar-toggle-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar-hover-group .nav-item-icon {
      flex-shrink: 0;
    }
    /* Active bar indicator hidden when collapsed */
    .sidebar-hover-group .nav-item-active::before {
      opacity: 0;

          { id: 6, name: 'Machine Bench Press', sets: 3, reps: 0, weight: 70, unit: 'kg', notes: '17kg each side increase. 25kg machine. 35 hammer strength. 70kg machine struggle. Until failure', link: '' },
          { id: 7, name: 'Overhead Triceps Extension', sets: 3, reps: 0, weight: 22.8, unit: 'kg', notes: '22.8kg. 36 smaller on Wantirna', link: '' },
        ]},
      ],
      log: [],  // { id, date, dayId, location, entries: [{ exerciseId, exerciseName, sets: [{ weight, reps }] }] }
    };

    // ==================== COLOR SYSTEM ====================
    const SCOL = {
      teal:   { dot: 'bg-teal-500', accent: 'text-teal-600 dark:text-teal-400', light: 'bg-teal-50 dark:bg-teal-900/20', border: 'border-teal-200 dark:border-teal-800', bar: 'bg-teal-500' },
      blue:   { dot: 'bg-blue-500', accent: 'text-blue-600 dark:text-blue-400', light: 'bg-blue-50 dark:bg-blue-900/20', border: 'border-blue-200 dark:border-blue-800', bar: 'bg-blue-500' },
      purple: { dot: 'bg-purple-500', accent: 'text-purple-600 dark:text-purple-400', light: 'bg-purple-50 dark:bg-purple-900/20', border: 'border-purple-200 dark:border-purple-800', bar: 'bg-purple-500' },
      pink:   { dot: 'bg-pink-500', accent: 'text-pink-600 dark:text-pink-400', light: 'bg-pink-50 dark:bg-pink-900/20', border: 'border-pink-200 dark:border-pink-800', bar: 'bg-pink-500' },
    };

    // ==================== STORAGE ====================
    const getItem = (key, def) => { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; };
    const setItem = (key, val) => localStorage.setItem(key, JSON.stringify(val));

    // ==================== UI COMPONENTS ====================
    const Card = ({ children, cls = '' }) => <div className={`app-card rounded-xl p-4 ${cls}`}>{children}</div>;
    const Btn = ({ children, onClick, variant = 'primary', disabled = false, cls = '' }) => {
      const base = 'px-4 py-2 rounded-lg font-semibold transition-all text-sm disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-teal-600 text-white hover:bg-teal-700 shadow-sm',
        secondary: 'bg-gray-100 dark:bg-neutral-800 text-gray-700 dark:text-neutral-200 hover:bg-gray-200 dark:hover:bg-neutral-700 border border-gray-200 dark:border-neutral-700',
        ghost: 'text-gray-500 dark:text-neutral-400 hover:text-gray-800 dark:hover:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800',
        danger: 'bg-red-500 text-white hover:bg-red-600 shadow-sm',
      };
      return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${cls}`}>{children}</button>;
    };
    const Inp = ({ value, onChange, placeholder = '', type = 'text', cls = '', disabled = false }) =>
      <input disabled={disabled} type={type} value={value} onChange={onChange} placeholder={placeholder} className={`w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 text-gray-900 dark:text-neutral-50 placeholder-gray-400 dark:placeholder-neutral-500 focus:outline-none focus:ring-2 focus:ring-teal-500 disabled:opacity-60 ${cls}`} />;
    const Sel = ({ value, onChange, children, cls = '' }) =>
      <select value={value} onChange={onChange} className={`w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 text-gray-900 dark:text-neutral-50 focus:outline-none focus:ring-2 focus:ring-teal-500 ${cls}`}>{children}</select>;
    const Badge = ({ children, variant = 'primary', cls = '' }) => {
      const variants = {
        primary: 'bg-teal-100 dark:bg-teal-900/30 text-teal-800 dark:text-teal-300',
        secondary: 'bg-gray-100 dark:bg-neutral-800 text-gray-700 dark:text-neutral-300',
        red: 'bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-300',
        amber: 'bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-300',
        green: 'bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300',
      };
      return <span className={`inline-block px-3 py-1 rounded-full text-xs font-semibold ${variants[variant]} ${cls}`}>{children}</span>;
    };
    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <Card cls="w-full max-w-md max-h-screen overflow-y-auto">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-xl font-bold">{title}</h2>
              <button onClick={onClose} className="text-gray-500 dark:text-neutral-500 hover:text-gray-700 dark:hover:text-neutral-300 text-2xl leading-none">×</button>
            </div>
            {children}
          </Card>
        </div>
      );
    };
    const PageHead = ({ children }) => <h1 className="text-2xl font-bold mb-6 tracking-tight">{children}</h1>;

    // ==================== MINI CALENDAR ====================
    const MiniCalendar = ({ dueDates = [] }) => {
      const today = new Date();
      const [view, setView] = useState({ m: today.getMonth(), y: today.getFullYear() });
      const firstDay = new Date(view.y, view.m, 1);
      const daysInMonth = new Date(view.y, view.m + 1, 0).getDate();
      const dueDays = new Set(dueDates.filter(Boolean).filter(d => {
        const dt = new Date(d + 'T00:00:00');
        return dt.getMonth() === view.m && dt.getFullYear() === view.y;
      }).map(d => +d.split('-')[2]));
      const prev = () => setView(v => v.m === 0 ? { m: 11, y: v.y - 1 } : { m: v.m - 1, y: v.y });
      const next = () => setView(v => v.m === 11 ? { m: 0, y: v.y + 1 } : { m: v.m + 1, y: v.y });
      const monthLabel = new Date(view.y, view.m).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
      const cells = [...Array(firstDay.getDay()).fill(null), ...Array.from({ length: daysInMonth }, (_, i) => i + 1)];
      return (
        <div>
          <div className="flex items-center justify-between mb-3">
            <p className="text-xs font-semibold text-gray-700 dark:text-neutral-300">{monthLabel}</p>
            <div className="flex gap-0.5">
              <button onClick={prev} className="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-100 dark:hover:bg-neutral-800 text-gray-500 text-sm">‹</button>
              <button onClick={next} className="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-100 dark:hover:bg-neutral-800 text-gray-500 text-sm">›</button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-0.5">
            {['S','M','T','W','T','F','S'].map((d,i) => <div key={i} className="text-center text-[10px] text-gray-400 dark:text-neutral-500 font-semibold pb-1">{d}</div>)}
            {cells.map((day, i) => {
              if (!day) return <div key={i} />;
              const isToday = day === today.getDate() && view.m === today.getMonth() && view.y === today.getFullYear();
              const hasDue = dueDays.has(day);
              return (
                <div key={i} className="flex items-center justify-center relative py-0.5">
                  <span className={`w-7 h-7 flex items-center justify-center text-xs rounded-full transition-colors ${isToday ? 'bg-teal-500 text-white font-bold' : 'text-gray-700 dark:text-neutral-300 hover:bg-gray-100 dark:hover:bg-neutral-800'}`}>{day}</span>
                  {hasDue && !isToday && <span className="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-amber-400" />}
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ==================== PAGES ====================
    const OverviewPage = ({ subjects, assignments, tasks, settings, onSettingsChange }) => {
      const [editOpen, setEditOpen] = useState(false);
      const [form, setForm] = useState(settings);
      const [now, setNow] = useState(new Date());
      useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);

      const saveSettings = () => { onSettingsChange(form); setEditOpen(false); };

      const todayStr = now.toISOString().split('T')[0];
      const todayTasks = tasks.filter(t => t.dueDate === todayStr && !t.done);
      const pending = assignments.filter(a => a.status !== 'Done');
      const dueThisWeek = pending.filter(a => { if (!a.dueDate) return false; const d = Math.ceil((new Date(a.dueDate+'T00:00:00') - now) / 86400000); return d >= 0 && d <= 7; });
      const upcoming = [...pending].filter(a => a.dueDate).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
      const h = now.getHours();
      const greeting = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
      const weekNum = () => { const s = new Date(now.getFullYear(), 0, 1); return Math.ceil(((now - s) / 86400000 + s.getDay() + 1) / 7); };
      const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) : '—';
      const daysLeft = d => { if (!d) return null; return Math.ceil((new Date(d+'T00:00:00') - now) / 86400000); };

      const kpis = [
        { label: 'Due This Week', value: dueThisWeek.length, color: 'text-amber-500', bg: 'bg-amber-50 dark:bg-neutral-800', border: 'border-amber-100 dark:border-neutral-700', accentColor: '#f59e0b' },
        { label: "Today's Tasks", value: todayTasks.length, color: 'text-teal-500', bg: 'bg-teal-50 dark:bg-neutral-800', border: 'border-teal-100 dark:border-neutral-700', accentColor: '#4FC3F7' },
        { label: 'Open Assignments', value: pending.length, color: 'text-blue-500', bg: 'bg-blue-50 dark:bg-neutral-800', border: 'border-blue-100 dark:border-neutral-700', accentColor: '#60a5fa' },
        { label: 'Current Week', value: `W${weekNum()}`, color: 'text-purple-500', bg: 'bg-purple-50 dark:bg-neutral-800', border: 'border-purple-100 dark:border-neutral-700', accentColor: '#a78bfa' },
      ];

      return (
        <div className="fade-in">
          {/* Greeting */}
          <div className="flex items-start justify-between mb-2">
            <div>
              <h1 className="text-2xl font-bold text-gray-900 dark:text-neutral-50">{greeting}, Karthik 👋</h1>
              <p className="text-sm text-gray-400 dark:text-neutral-500 mt-0.5">
                {now.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                <span className="mx-1.5 opacity-40">·</span>
                {now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
              </p>
              <p className="text-sm mt-1"><span className="font-semibold text-gray-700 dark:text-neutral-300">{settings.weekLabel}</span> <span className="text-gray-400 dark:text-neutral-500">— {settings.weekGoal}</span></p>
              {settings.focus && <p className="text-xs text-teal-600 dark:text-teal-400 mt-0.5">🎯 Focus: {settings.focus}</p>}
            </div>
            <button onClick={() => { setForm(settings); setEditOpen(true); }} className="text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300 p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800 transition text-base" title="Edit overview settings">✏️</button>
          </div>

          {/* KPI strip */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5 mt-5">
            {kpis.map(k => (
              <div key={k.label} className={`kpi-card ${k.bg} border ${k.border} rounded-xl p-4`} data-accent={k.accentColor}>
                <p className="text-xs text-gray-500 dark:text-neutral-500 font-medium mb-1.5">{k.label}</p>
                <p className={`text-2xl font-bold ${k.color}`}>{k.value}</p>
              </div>
            ))}
          </div>

          {/* Main grid */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {/* Mini calendar */}
            <Card cls="p-5">
              <MiniCalendar dueDates={pending.map(a => a.dueDate)} />
            </Card>

            {/* Upcoming deadlines */}
            <Card cls="md:col-span-2">
              <h3 className="font-semibold text-sm mb-3">Upcoming Deadlines</h3>
              {upcoming.length === 0
                ? <p className="text-sm text-gray-400 dark:text-neutral-500 py-4 text-center">🎉 All clear! No pending assignments.</p>
                : upcoming.slice(0, 5).map(a => {
                    const d = daysLeft(a.dueDate);
                    const urg = d <= 2 ? 'text-red-500' : d <= 5 ? 'text-amber-500' : 'text-gray-400 dark:text-neutral-500';
                    const label = d === 0 ? 'Today' : d === 1 ? 'Tomorrow' : d < 0 ? `${Math.abs(d)}d overdue` : `${d}d left`;
                    return (
                      <div key={a.id} className="flex items-center gap-3 py-2.5 border-b border-gray-50 dark:border-neutral-800/50 last:border-0">
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-medium text-gray-800 dark:text-neutral-200 truncate">{a.title}</p>
                          <p className="text-xs text-gray-400 dark:text-neutral-500 mt-0.5">{a.subject}</p>
                        </div>
                        <div className="text-right flex-shrink-0">
                          <p className={`text-xs font-semibold ${urg}`}>{label}</p>
                          <p className="text-xs text-gray-400 dark:text-neutral-500">{fmtDate(a.dueDate)}</p>
                        </div>
                      </div>
                    );
                  })
              }
            </Card>

            {/* Today's focus */}
            <Card cls="md:col-span-2">
              <h3 className="font-semibold text-sm mb-3">Today's Focus</h3>
              {todayTasks.length === 0
                ? <p className="text-sm text-gray-400 dark:text-neutral-500">No tasks for today — add some in To-Do!</p>
                : <div className="space-y-2">
                    {todayTasks.map(t => (
                      <div key={t.id} className="flex items-center gap-2.5 p-2.5 bg-gray-50 dark:bg-neutral-900 rounded-lg">
                        <span className={`w-2 h-2 rounded-full flex-shrink-0 ${t.priority==='high'?'bg-red-400':t.priority==='medium'?'bg-amber-400':'bg-gray-300'}`} />
                        <span className="text-sm text-gray-700 dark:text-neutral-300 flex-1">{t.title}</span>
                        <Badge variant={t.priority==='high'?'red':t.priority==='medium'?'amber':'secondary'}>{t.priority}</Badge>
                      </div>
                    ))}
                  </div>
              }
            </Card>

            {/* Subject progress */}
            <Card>
              <h3 className="font-semibold text-sm mb-4">Progress by Subject</h3>
              <div className="space-y-3">
                {subjects.map(s => {
                  const sa = assignments.filter(a => a.subject === s.code);
                  const avg = sa.length ? Math.round(sa.reduce((acc,a) => acc + a.progress, 0) / sa.length) : 0;
                  return (
                    <div key={s.id}>
                      <div className="flex justify-between text-xs mb-1">
                        <span className="text-gray-600 dark:text-neutral-400">{s.code}</span>
                        <span className="text-gray-500 dark:text-neutral-400 font-medium">{avg}%</span>
                      </div>
                      <div className="h-1.5 bg-gray-100 dark:bg-neutral-800 rounded-full">
                        <div className={`h-1.5 rounded-full transition-all ${SCOL[s.color]?.bar || 'bg-teal-500'}`} style={{ width: `${avg}%` }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          </div>

          <Modal isOpen={editOpen} onClose={() => setEditOpen(false)} title="Edit Overview">
            <div className="space-y-4">
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Week Label</label><Inp value={form.weekLabel} onChange={e => setForm({ ...form, weekLabel: e.target.value })} placeholder="e.g. Week 8 — Mid Semester" /></div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Weekly Goal</label><Inp value={form.weekGoal} onChange={e => setForm({ ...form, weekGoal: e.target.value })} placeholder="What's your main goal this week?" /></div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Focus of the Week</label><Inp value={form.focus} onChange={e => setForm({ ...form, focus: e.target.value })} placeholder="e.g. Consumer Behaviour Report" /></div>
              <div className="flex gap-2 pt-1"><Btn variant="primary" onClick={saveSettings} cls="flex-1">Save</Btn><Btn variant="secondary" onClick={() => setEditOpen(false)} cls="flex-1">Cancel</Btn></div>
            </div>
          </Modal>
        </div>
      );
    };

    const CalendarPage = ({ assignments = [], tasks = [], tutoring = { sessions: [], students: [] } }) => {
      const [gcalUrl, setGcalUrl] = useState(getItem('hub_gcal', ''));
      const [saveMsg, setSaveMsg] = useState('');
      const [selectedDay, setSelectedDay] = useState(null);
      const todayReal = new Date();
      const [view, setView] = useState({ month: todayReal.getMonth(), year: todayReal.getFullYear() });

      const saveGcal = () => {
        setItem('hub_gcal', gcalUrl);
        setSaveMsg('Saved!');
        setTimeout(() => setSaveMsg(''), 2000);
      };

      const prevMonth = () => setView(v => v.month === 0 ? { month: 11, year: v.year - 1 } : { month: v.month - 1, year: v.year });
      const nextMonth = () => setView(v => v.month === 11 ? { month: 0, year: v.year + 1 } : { month: v.month + 1, year: v.year });

      const { month, year } = view;
      const firstDay = new Date(year, month, 1);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - firstDay.getDay());

      const days = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + i);
        days.push(d);
      }

      const toDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

      const getEventsForDay = (d) => {
        const ds = toDateStr(d);
        const asgn = assignments.filter(a => a.dueDate === ds && a.status !== 'Done');
        const tsk = tasks.filter(t => t.dueDate === ds && !t.done);
        const tut = (tutoring.sessions || []).filter(s => s.date === ds);
        // Also add upcoming recurring sessions not yet logged
        const students = tutoring.students || [];
        const recurSessions = students.filter(st => st.active && st.recurDay === d.getDay()).filter(st => !tut.some(s => s.studentId === st.id));
        return { asgn, tsk, tut, recurSessions };
      };

      const monthName = new Date(year, month).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
      const selEvents = selectedDay ? getEventsForDay(selectedDay) : null;

      const SCOL_DOT = { 'MKTG10001': 'bg-teal-400', 'ECON1004': 'bg-blue-400', 'CMCE10002': 'bg-purple-400', 'MUSI20206': 'bg-pink-400' };

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold">Calendar</h1>
            <Btn variant="secondary" onClick={() => window.open('https://calendar.google.com', '_blank')}>📅 Open Google Calendar</Btn>
          </div>

          <div className="flex gap-4 flex-col xl:flex-row">
            <div className="flex-1">
              <Card cls="mb-4">
                {/* Month nav */}
                <div className="flex items-center justify-between mb-4">
                  <button onClick={prevMonth} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800 text-gray-600 dark:text-neutral-400 font-bold text-lg">‹</button>
                  <h2 className="font-semibold text-lg">{monthName}</h2>
                  <button onClick={nextMonth} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800 text-gray-600 dark:text-neutral-400 font-bold text-lg">›</button>
                </div>
                <div className="grid grid-cols-7 gap-1">
                  {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
                    <div key={d} className="text-center text-xs font-semibold py-2 text-gray-500 dark:text-neutral-500">{d}</div>
                  ))}
                  {days.map((d, i) => {
                    const isThisMonth = d.getMonth() === month;
                    const isToday = d.toDateString() === todayReal.toDateString();
                    const isSelected = selectedDay && d.toDateString() === selectedDay.toDateString();
                    const { asgn, tsk, recurSessions } = getEventsForDay(d);
                    const hasEvents = asgn.length > 0 || tsk.length > 0 || recurSessions.length > 0;
                    return (
                      <div key={i} onClick={() => setSelectedDay(d)}
                        className={`min-h-16 p-1.5 rounded-lg border text-xs cursor-pointer transition-all
                          ${isThisMonth ? 'border-gray-200 dark:border-neutral-800' : 'border-gray-100 dark:border-neutral-900 opacity-40'}
                          ${isToday ? 'border-teal-400 dark:border-teal-600 bg-teal-50 dark:bg-teal-900/20' : 'bg-white dark:bg-neutral-950 hover:bg-gray-50 dark:hover:bg-neutral-900'}
                          ${isSelected ? 'ring-2 ring-teal-500' : ''}`}>
                        <div className={`font-semibold text-xs mb-1 w-5 h-5 flex items-center justify-center rounded-full
                          ${isToday ? 'bg-teal-500 text-white' : 'text-gray-600 dark:text-neutral-400'}`}>
                          {d.getDate()}
                        </div>
                        {isThisMonth && (
                          <div className="space-y-0.5">
                            {asgn.slice(0,2).map((a,j) => (
                              <div key={j} className={`text-[10px] truncate px-1 py-0.5 rounded font-medium ${SCOL_DOT[a.subject] ? '' : 'bg-teal-100 dark:bg-teal-900/30 text-teal-700 dark:text-teal-300'}`}
                                style={{background: a.subject==='MKTG10001'?'rgba(20,184,166,0.15)':a.subject==='ECON1004'?'rgba(59,130,246,0.15)':a.subject==='CMCE10002'?'rgba(168,85,247,0.15)':'rgba(236,72,153,0.15)',
                                  color: a.subject==='MKTG10001'?'#0d9488':a.subject==='ECON1004'?'#2563eb':a.subject==='CMCE10002'?'#7c3aed':'#db2777'}}>
                                {a.subject}
                              </div>
                            ))}
                            {tsk.slice(0, 1).map((t, j) => (
                              <div key={j} className="text-[10px] truncate px-1 py-0.5 rounded bg-gray-100 dark:bg-neutral-800 text-gray-600 dark:text-neutral-400">
                                ✓ {t.title}
                              </div>
                            ))}
                            {(recurSessions.slice(0,1)).map((st, j) => (
                              <div key={j} className="text-[10px] truncate px-1 py-0.5 rounded bg-green-100 dark:bg-green-900/20 text-green-700 dark:text-green-400">
                                👨‍🏫 {st.name}
                              </div>
                            ))}
                            {(asgn.length + tsk.length + recurSessions.length) > 3 && (
                              <div className="text-[10px] text-gray-400 dark:text-neutral-500">+{asgn.length + tsk.length + recurSessions.length - 3} more</div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </Card>
            </div>

            {/* Side panel */}
            <div className="xl:w-72 flex-shrink-0 space-y-4">
              {selectedDay ? (
                <Card>

        } else {
          onUpdate([...assignments, { ...a, id: Math.max(...assignments.map(x => x.id), 0) + 1 }]);

        setEditId(null);
