    const TodoPage = ({ tasks, onUpdate }) => {
      const [modalOpen, setModalOpen] = useState(false);
      const [editTask, setEditTask] = useState(null);
      const blankTask = { title: '', done: false, priority: 'medium', dueDate: '' };

      const openAdd = () => { setEditTask(null); setModalOpen(true); };
      const openEdit = (t) => { setEditTask(t); setModalOpen(true); };

      const handleSave = (form) => {
        if (!form.title.trim()) return;
        if (editTask) {
          onUpdate(tasks.map(t => t.id === editTask.id ? { ...form, id: editTask.id } : t));
        } else {
          onUpdate([...tasks, { ...form, id: Math.max(0, ...tasks.map(t => t.id)) + 1, done: false }]);
        }
        setModalOpen(false);
      };

      const handleToggle = (id) => onUpdate(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
      const handleDelete = (id) => onUpdate(tasks.filter(t => t.id !== id));

      const todayStr = new Date().toISOString().split('T')[0];
      const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) : '';
      const daysLeft = d => { if (!d) return null; const n = Math.ceil((new Date(d+'T00:00:00') - new Date()) / 86400000); return n; };

      const active = tasks.filter(t => !t.done);
      const groups = [
        { label: '🔴 Overdue', items: active.filter(t => t.dueDate && daysLeft(t.dueDate) < 0) },
        { label: '📅 Today', items: active.filter(t => t.dueDate === todayStr) },
        { label: '🔼 High Priority', items: active.filter(t => t.priority === 'high' && (!t.dueDate || daysLeft(t.dueDate) > 0)) },
        { label: '🟡 Medium Priority', items: active.filter(t => t.priority === 'medium' && (!t.dueDate || daysLeft(t.dueDate) > 0)) },
        { label: '⚪ Low Priority', items: active.filter(t => t.priority === 'low' && (!t.dueDate || daysLeft(t.dueDate) > 0)) },
      ];
      const done = tasks.filter(t => t.done);

      const TaskForm = ({ initial, onSave, onCancel }) => {
        const [form, setForm] = useState(initial || blankTask);
        return (
          <div className="space-y-3">
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Task *</label><Inp value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="What needs to be done?" /></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Priority</label>
                <Sel value={form.priority} onChange={e => setForm({...form, priority: e.target.value})}>
                  <option value="high">🔴 High</option><option value="medium">🟡 Medium</option><option value="low">⚪ Low</option>
                </Sel>
              </div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Due Date</label><Inp type="date" value={form.dueDate} onChange={e => setForm({...form, dueDate: e.target.value})} /></div>
            </div>
            <div className="flex gap-2 pt-1"><Btn variant="primary" onClick={() => onSave(form)} cls="flex-1">Save Task</Btn><Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn></div>
          </div>
        );
      };

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-6">
            <div><h1 className="text-2xl font-bold">To-Do</h1><p className="text-sm text-gray-500 dark:text-neutral-500 mt-0.5">{active.length} active · {done.length} completed</p></div>
            <Btn variant="primary" onClick={openAdd}>+ Add Task</Btn>
          </div>

          {groups.map(g => g.items.length > 0 && (
            <div key={g.label} className="mb-5">
              <h3 className="text-xs font-bold text-gray-400 dark:text-neutral-500 uppercase tracking-wider mb-2">{g.label} · {g.items.length}</h3>
              <div className="space-y-2">
                {g.items.map(t => (
                  <div key={t.id} className="flex items-center gap-3 p-3 bg-white dark:bg-neutral-950 rounded-xl border border-gray-200 dark:border-neutral-800 group hover:border-gray-300 dark:hover:border-neutral-700 transition-all">
                    <button onClick={() => handleToggle(t.id)} className={`w-4 h-4 rounded border-2 flex-shrink-0 flex items-center justify-center transition-all ${t.done ? 'bg-teal-500 border-teal-500' : 'border-gray-300 dark:border-neutral-600 hover:border-teal-400'}`}>
                      {t.done && <span className="text-white text-[9px] font-black">✓</span>}
                    </button>
                    <span className="flex-1 text-sm text-gray-800 dark:text-neutral-200">{t.title}</span>
                    {t.dueDate && (
                      <span className={`text-xs flex-shrink-0 ${daysLeft(t.dueDate) < 0 ? 'text-red-500' : daysLeft(t.dueDate) === 0 ? 'text-amber-500 font-semibold' : 'text-gray-400 dark:text-neutral-500'}`}>
                        {daysLeft(t.dueDate) < 0 ? `${Math.abs(daysLeft(t.dueDate))}d overdue` : daysLeft(t.dueDate) === 0 ? 'Today' : fmtDate(t.dueDate)}
                      </span>
                    )}
                    <Badge variant={t.priority==='high'?'red':t.priority==='medium'?'amber':'secondary'} cls="flex-shrink-0">{t.priority}</Badge>
                    <div className="opacity-0 group-hover:opacity-100 flex gap-1 transition-opacity flex-shrink-0">
                      <button onClick={() => openEdit(t)} className="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300 px-1.5 py-0.5 rounded hover:bg-gray-100 dark:hover:bg-neutral-800">Edit</button>
                      <button onClick={() => handleDelete(t.id)} className="text-xs text-red-400 hover:text-red-600 px-1.5 py-0.5 rounded hover:bg-red-50 dark:hover:bg-red-900/20">✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}

          {active.length === 0 && <div className="text-center py-16 text-gray-400 dark:text-neutral-500"><p className="text-3xl mb-2">🎉</p><p className="text-sm">All done! Add a new task above.</p></div>}

          {done.length > 0 && (
            <div className="mb-5">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold text-gray-400 dark:text-neutral-500 uppercase tracking-wider">✅ Completed · {done.length}</h3>
                <button onClick={() => onUpdate(tasks.filter(t => !t.done))} className="text-xs text-red-400 hover:text-red-600 transition-colors">Clear all</button>
              </div>
              <div className="space-y-1.5 opacity-50">
                {done.map(t => (
                  <div key={t.id} className="flex items-center gap-3 p-2.5 bg-gray-50 dark:bg-neutral-900 rounded-lg">
                    <span className="w-4 h-4 rounded border-2 bg-teal-500 border-teal-500 flex items-center justify-center flex-shrink-0"><span className="text-white text-[9px] font-black">✓</span></span>
                    <span className="flex-1 text-sm line-through text-gray-500 dark:text-neutral-500">{t.title}</span>
                    <button onClick={() => handleDelete(t.id)} className="text-xs text-red-400 hover:text-red-600">✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          <Modal isOpen={modalOpen} onClose={() => setModalOpen(false)} title={editTask ? 'Edit Task' : 'New Task'}>
            <TaskForm initial={editTask} onSave={handleSave} onCancel={() => setModalOpen(false)} />
          </Modal>
        </div>
      );
    };

    const OTunesPage = ({ otunes, onUpdate }) => {
      const [modalOpen, setModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const columns = ['Backlog', 'To Do', 'In Progress', 'Done'];

      const cardsByCol = (col) => otunes.filter(c => c.col === col);

      const catColors = {
        'Competitive Analysis': 'bg-teal-100 dark:bg-teal-900/30 text-teal-800 dark:text-teal-300',
        'Bug Testing': 'bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-300',
        'Customer Support': 'bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300',
        'Marketing': 'bg-purple-100 dark:bg-purple-900/30 text-purple-800 dark:text-purple-300',
      };

      const handleSave = (c) => {
        if (editId) {
          onUpdate(otunes.map(x => x.id === editId ? { ...c, id: editId } : x));
        } else {
          onUpdate([...otunes, { ...c, id: Math.max(...otunes.map(x => x.id), 0) + 1 }]);
        }
        setModalOpen(false);
        setEditId(null);
      };

      const handleDelete = (id) => {
        onUpdate(otunes.filter(c => c.id !== id));
      };

      return (
        <div className="fade-in">
          <PageHead>oTunes Board</PageHead>
          <div className="grid grid-cols-4 gap-4 mb-6">
            {columns.map(col => (
              <div key={col}>
                <div className="font-semibold mb-2">{col} ({cardsByCol(col).length})</div>
              </div>
            ))}
          </div>
          <div className="grid grid-cols-4 gap-4">
            {columns.map(col => (
              <div key={col}>
                <div className="space-y-3">
                  {cardsByCol(col).map(c => (
                    <Card key={c.id} cls="cursor-pointer hover:shadow-lg transition">
                      <div onClick={() => { setEditId(c.id); setModalOpen(true); }} className="mb-2">
                        <h4 className="font-semibold text-sm">{c.title}</h4>
                        <Badge variant="secondary" cls={`text-xs mt-1 ${catColors[c.category] || ''}`}>{c.category}</Badge>
                      </div>
                      <div className="flex gap-2 items-center mb-2">
                        <span className={`w-3 h-3 rounded-full ${c.priority === 'high' ? 'bg-red-500' : c.priority === 'medium' ? 'bg-amber-500' : 'bg-green-500'}`}></span>
                        <span className="text-xs text-gray-600 dark:text-neutral-400">{c.priority}</span>
                      </div>
                      {c.notes && <p className="text-xs text-gray-600 dark:text-neutral-400 italic mb-2">{c.notes}</p>}
                      <Btn variant="danger" onClick={() => handleDelete(c.id)} cls="text-xs w-full">Delete</Btn>
                    </Card>
                  ))}
                  <Btn variant="secondary" onClick={() => { setEditId(null); setModalOpen(true); }} cls="w-full text-sm">+ Add Card</Btn>
                </div>
              </div>
            ))}
          </div>

          <Modal isOpen={modalOpen} onClose={() => { setModalOpen(false); setEditId(null); }} title={editId ? 'Edit Card' : 'Add Card'}>
            <OTunesForm card={editId ? otunes.find(c => c.id === editId) : null} onSave={handleSave} onCancel={() => { setModalOpen(false); setEditId(null); }} />
          </Modal>
        </div>
      );
    };

    const OTunesForm = ({ card, onSave, onCancel }) => {
      const [form, setForm] = useState(card || { title: '', category: 'Marketing', col: 'To Do', priority: 'medium', notes: '' });

      return (
        <div className="space-y-3 text-sm">
          <Inp value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} placeholder="Card title" />
          <Sel value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
            <option>Competitive Analysis</option><option>Bug Testing</option><option>Customer Support</option><option>Marketing</option>
          </Sel>
          <Sel value={form.col} onChange={(e) => setForm({ ...form, col: e.target.value })}>
            <option>Backlog</option><option>To Do</option><option>In Progress</option><option>Done</option>
          </Sel>
          <Sel value={form.priority} onChange={(e) => setForm({ ...form, priority: e.target.value })}>
            <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option>
          </Sel>
          <Inp value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} placeholder="Notes" />
          <div className="flex gap-2 mt-4">
            <Btn variant="primary" onClick={() => onSave(form)} cls="flex-1">Save</Btn>
            <Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn>
          </div>
        </div>
      );
    };

    const TutoringPage = ({ tutoring, onUpdate }) => {
      const [tab, setTab] = useState('log');
      const [sessionModal, setSessionModal] = useState(false);
      const [studentModal, setStudentModal] = useState(false);
      const [editStudent, setEditStudent] = useState(null);
      const [rateEdit, setRateEdit] = useState(false);
      const [newRate, setNewRate] = useState(tutoring.rate);

      const students = tutoring.students || [];
      const sessions = tutoring.sessions || [];

      const totalHours = sessions.reduce((a, b) => a + b.duration, 0);
      const paidEarnings = sessions.filter(s => s.paid).reduce((a, b) => a + b.duration * tutoring.rate, 0);
      const unpaidAmount = sessions.filter(s => !s.paid).reduce((a, b) => a + b.duration * tutoring.rate, 0);

      const saveRate = () => { onUpdate({ ...tutoring, rate: Number(newRate) }); setRateEdit(false); };
      const deleteSession = (id) => onUpdate({ ...tutoring, sessions: sessions.filter(s => s.id !== id) });
      const togglePaid = (id, val) => onUpdate({ ...tutoring, sessions: sessions.map(s => s.id === id ? { ...s, paid: val } : s) });

      const addSession = (form) => {
        const st = students.find(s => s.id === Number(form.studentId));
        const newSess = { ...form, id: Math.max(0, ...sessions.map(s => s.id)) + 1, studentId: Number(form.studentId), student: st ? st.name : form.student, subject: st ? st.subject : form.subject };
        onUpdate({ ...tutoring, sessions: [...sessions, newSess] });
        setSessionModal(false);
      };

      const saveStudent = (form) => {
        if (editStudent) {
          onUpdate({ ...tutoring, students: students.map(s => s.id === editStudent.id ? { ...form, id: editStudent.id } : s) });
        } else {
          onUpdate({ ...tutoring, students: [...students, { ...form, id: Math.max(0, ...students.map(s => s.id)) + 1 }] });
        }
        setStudentModal(false); setEditStudent(null);
      };

      const deleteStudent = (id) => onUpdate({ ...tutoring, students: students.filter(s => s.id !== id) });

      const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

      // Generate upcoming sessions from recurring schedule (next 4 weeks)
      const getUpcoming = () => {
        const upcoming = [];
        const now = new Date(); now.setHours(0,0,0,0);
        students.filter(s => s.active && s.recurDay != null).forEach(st => {
          for (let w = 0; w < 4; w++) {
            const d = new Date(now);
            const diff = (st.recurDay - d.getDay() + 7) % 7 + w * 7;
            d.setDate(d.getDate() + diff);
            const dateStr = d.toISOString().split('T')[0];
            const alreadyLogged = sessions.some(s => s.studentId === st.id && s.date === dateStr);
            if (!alreadyLogged) upcoming.push({ student: st, date: dateStr, dateObj: d });
          }
        });
        return upcoming.sort((a,b) => a.dateObj - b.dateObj).slice(0, 8);
      };
      const upcoming = getUpcoming();

      const StudentForm = ({ initial, onSave, onCancel }) => {
        const [f, setF] = useState(initial || { name: '', subject: '', recurDay: 2, recurTime: '15:00', duration: 1, active: true, notes: '' });
        return (
          <div className="space-y-3 text-sm">
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Student Name</label><Inp value={f.name} onChange={e => setF({...f, name: e.target.value})} placeholder="e.g. Alex M." /></div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Subject</label><Inp value={f.subject} onChange={e => setF({...f, subject: e.target.value})} placeholder="e.g. Mathematics" /></div>
            </div>
            <div className="grid grid-cols-3 gap-3">
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Recurring Day</label>
                <Sel value={f.recurDay} onChange={e => setF({...f, recurDay: Number(e.target.value)})}>
                  {DAY_NAMES.map((d,i) => <option key={i} value={i}>{d}</option>)}
                </Sel>
              </div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Time</label><Inp type="time" value={f.recurTime} onChange={e => setF({...f, recurTime: e.target.value})} /></div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Duration (hrs)</label><Inp type="number" step="0.5" min="0.5" value={f.duration} onChange={e => setF({...f, duration: Number(e.target.value)})} /></div>
            </div>
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Notes</label><Inp value={f.notes} onChange={e => setF({...f, notes: e.target.value})} placeholder="e.g. Year 11 — exam prep" /></div>
            <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={f.active} onChange={e => setF({...f, active: e.target.checked})} className="accent-teal-500" /><span className="text-sm">Active (show in schedule)</span></label>
            <div className="flex gap-2 pt-1"><Btn variant="primary" onClick={() => onSave(f)} cls="flex-1">Save Student</Btn><Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn></div>
          </div>
        );
      };

      const SessionForm = ({ onSave, onCancel }) => {
        const [f, setF] = useState({ studentId: students[0]?.id || '', date: new Date().toISOString().split('T')[0], duration: 1, notes: '', paid: false });
        const selStudent = students.find(s => s.id === Number(f.studentId));
        return (
          <div className="space-y-3 text-sm">
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Student</label>
              <Sel value={f.studentId} onChange={e => setF({...f, studentId: e.target.value})}>
                {students.map(s => <option key={s.id} value={s.id}>{s.name} — {s.subject}</option>)}
                <option value="">Other (manual)</option>
              </Sel>
            </div>
            {!f.studentId && <div className="grid grid-cols-2 gap-3">
              <Inp value={f.student||''} onChange={e => setF({...f, student: e.target.value})} placeholder="Student name" />
              <Inp value={f.subject||''} onChange={e => setF({...f, subject: e.target.value})} placeholder="Subject" />
            </div>}
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Date</label><Inp type="date" value={f.date} onChange={e => setF({...f, date: e.target.value})} /></div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Duration (hrs)</label><Inp type="number" step="0.5" min="0.5" value={selStudent ? selStudent.duration : f.duration} onChange={e => setF({...f, duration: Number(e.target.value)})} /></div>
            </div>
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Notes</label><Inp value={f.notes} onChange={e => setF({...f, notes: e.target.value})} placeholder="Topics covered" /></div>
            <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={f.paid} onChange={e => setF({...f, paid: e.target.checked})} className="accent-teal-500" /><span>Mark as paid</span></label>
            <div className="flex gap-2 pt-1"><Btn variant="primary" onClick={() => onSave({...f, duration: selStudent ? selStudent.duration : f.duration})} cls="flex-1">Log Session</Btn><Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn></div>
          </div>
        );
      };

      return (
        <div className="fade-in">
          <div className="flex items-start justify-between mb-6">
            <div><h1 className="text-2xl font-bold">Tutoring</h1>
              <p className="text-sm text-gray-500 dark:text-neutral-500 mt-0.5">{students.filter(s=>s.active).length} active students · {sessions.length} sessions logged</p>
            </div>
            <div className="flex items-center gap-2">
              {!rateEdit
                ? <div className="flex items-center gap-2"><span className="text-sm font-semibold text-gray-600 dark:text-neutral-400">${tutoring.rate}/hr</span><button onClick={() => { setNewRate(tutoring.rate); setRateEdit(true); }} className="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300">✏️</button></div>
                : <div className="flex items-center gap-1"><span className="text-sm text-gray-600 dark:text-neutral-400">$</span><Inp type="number" value={newRate} onChange={e => setNewRate(e.target.value)} cls="w-16 text-sm py-1" /><span className="text-sm text-gray-500">/hr</span><Btn variant="primary" onClick={saveRate} cls="text-xs py-1 px-2">✓</Btn><Btn variant="secondary" onClick={() => setRateEdit(false)} cls="text-xs py-1 px-2">✕</Btn></div>
              }
            </div>
          </div>

          {/* KPI strip */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
            {[
              { label: 'Total Sessions', value: sessions.length, color: 'text-teal-500' },
              { label: 'Total Hours', value: totalHours.toFixed(1) + 'h', color: 'text-blue-500' },
              { label: 'Earned (paid)', value: '$' + paidEarnings.toFixed(0), color: 'text-green-500' },
              { label: 'Unpaid', value: '$' + unpaidAmount.toFixed(0), color: 'text-amber-500' },
            ].map(k => (
              <div key={k.label} className="bg-white dark:bg-neutral-950 rounded-xl border border-gray-200 dark:border-neutral-800 p-4">
                <p className="text-xs text-gray-500 dark:text-neutral-500 mb-1">{k.label}</p>
                <p className={`text-2xl font-bold ${k.color}`}>{k.value}</p>
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div className="flex gap-1.5 mb-5 p-1.5 bg-gray-100 dark:bg-neutral-900 rounded-xl w-fit">
            {[['log','Session Log'],['schedule','Schedule'],['students','Students']].map(([id,label]) => (
              <button key={id} onClick={() => setTab(id)} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===id ? 'bg-white dark:bg-neutral-800 shadow-sm text-teal-600 dark:text-teal-400' : 'text-gray-500 dark:text-neutral-500 hover:text-gray-700 dark:hover:text-neutral-300'}`}>{label}</button>
            ))}
          </div>

          {/* Session Log tab */}
          {tab === 'log' && (
            <div>
              <div className="flex justify-between items-center mb-3">
                <h3 className="font-semibold text-sm">Past Sessions</h3>
                <Btn variant="primary" onClick={() => setSessionModal(true)}>+ Log Session</Btn>
              </div>
              <Card cls="overflow-x-auto">
                <table className="w-full text-sm min-w-[600px]">
                  <thead className="border-b border-gray-100 dark:border-neutral-800">
                    <tr>{['Date','Student','Subject','Duration','Earned','Notes','Paid',''].map(h => <th key={h} className="text-left py-2.5 pr-4 text-xs font-semibold text-gray-400 dark:text-neutral-500 uppercase tracking-wide">{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {[...sessions].sort((a,b) => new Date(b.date) - new Date(a.date)).map(s => (
                      <tr key={s.id} className="border-b border-gray-50 dark:border-neutral-800/40 hover:bg-gray-50/50 dark:hover:bg-neutral-900/50 last:border-0">
                        <td className="py-2.5 pr-4 text-gray-700 dark:text-neutral-300 whitespace-nowrap">{fmtDate(s.date)}</td>
                        <td className="py-2.5 pr-4 font-medium text-gray-800 dark:text-neutral-200">{s.student}</td>
                        <td className="py-2.5 pr-4 text-gray-500 dark:text-neutral-500">{s.subject}</td>
                        <td className="py-2.5 pr-4 text-gray-600 dark:text-neutral-400">{s.duration}h</td>
                        <td className="py-2.5 pr-4 text-gray-600 dark:text-neutral-400">${(s.duration * tutoring.rate).toFixed(0)}</td>
                        <td className="py-2.5 pr-4 text-xs text-gray-400 dark:text-neutral-500 max-w-32 truncate">{s.notes}</td>
                        <td className="py-2.5 pr-4"><input type="checkbox" checked={s.paid} onChange={e => togglePaid(s.id, e.target.checked)} className="accent-teal-500 cursor-pointer w-4 h-4" /></td>
                        <td className="py-2.5"><button onClick={() => deleteSession(s.id)} className="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 dark:hover:bg-red-900/20">✕</button></td>
                      </tr>
                    ))}
                    {sessions.length === 0 && <tr><td colSpan={8} className="py-12 text-center text-sm text-gray-400 dark:text-neutral-500">No sessions logged yet.</td></tr>}
                  </tbody>
                </table>
              </Card>
            </div>
          )}

          {/* Schedule tab */}
          {tab === 'schedule' && (
            <div>
              <div className="flex justify-between items-center mb-3">
                <h3 className="font-semibold text-sm">Upcoming Sessions (next 4 weeks)</h3>
                <Btn variant="primary" onClick={() => setSessionModal(true)}>+ Log Session</Btn>
              </div>
              {upcoming.length === 0
                ? <Card cls="py-12 text-center"><p className="text-sm text-gray-400 dark:text-neutral-500">No upcoming sessions — add students with a recurring schedule.</p></Card>
                : <div className="space-y-2">
                    {upcoming.map((u, i) => {
                      const st = u.student;
                      const col = SCOL[['teal','blue','purple','pink'][st.id % 4]] || SCOL.teal;
                      const isThisWeek = (() => { const n = new Date(); const end = new Date(n); end.setDate(n.getDate() + 7); return u.dateObj >= n && u.dateObj < end; })();
                      return (
                        <div key={i} className={`flex items-center gap-4 p-3.5 rounded-xl border ${isThisWeek ? 'border-teal-200 dark:border-teal-800 bg-teal-50 dark:bg-teal-900/10' : 'border-gray-200 dark:border-neutral-800 bg-white dark:bg-neutral-950'}`}>
                          <div className={`w-2 h-10 rounded-full flex-shrink-0 ${col.dot}`} />
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-semibold text-gray-800 dark:text-neutral-200">{st.name}</p>
                            <p className="text-xs text-gray-500 dark:text-neutral-500">{st.subject} · {st.recurTime} · {st.duration}h</p>
                          </div>
                          <div className="text-right flex-shrink-0">
                            <p className="text-sm font-medium text-gray-700 dark:text-neutral-300">{fmtDate(u.date)}</p>
                            <p className="text-xs text-gray-400 dark:text-neutral-500">{DAY_NAMES[u.dateObj.getDay()]}{isThisWeek ? ' · This week' : ''}</p>
                          </div>
                          <Btn variant="secondary" onClick={() => {
                            const f = { studentId: st.id, date: u.date, duration: st.duration, notes: '', paid: false };
                            addSession(f);
                          }} cls="text-xs flex-shrink-0">Log</Btn>
                        </div>
                      );
                    })}
                  </div>
              }
            </div>
          )}

          {/* Students tab */}
          {tab === 'students' && (
            <div>
              <div className="flex justify-between items-center mb-3">
                <h3 className="font-semibold text-sm">Student Roster</h3>
                <Btn variant="primary" onClick={() => { setEditStudent(null); setStudentModal(true); }}>+ Add Student</Btn>
              </div>
              <div className="space-y-3">
                {students.map(st => {
                  const stSessions = sessions.filter(s => s.studentId === st.id);
                  const stHours = stSessions.reduce((a,b) => a + b.duration, 0);
                  const col = SCOL[['teal','blue','purple','pink'][st.id % 4]] || SCOL.teal;
                  return (
                    <Card key={st.id} cls={`border-l-4 ${col.border}`}>
                      <div className="flex items-start justify-between">
                        <div className="flex-1">
                          <div className="flex items-center gap-2 mb-1">
                            <h4 className="font-semibold text-gray-900 dark:text-neutral-100">{st.name}</h4>
                            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${st.active ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400' : 'bg-gray-100 dark:bg-neutral-800 text-gray-500'}`}>{st.active ? 'Active' : 'Inactive'}</span>
                          </div>
                          <p className="text-sm text-gray-600 dark:text-neutral-400">{st.subject}</p>
                          <p className="text-xs text-gray-400 dark:text-neutral-500 mt-1">Every {DAY_NAMES[st.recurDay]} at {st.recurTime} · {st.duration}h · ${(st.duration * tutoring.rate).toFixed(0)}/session</p>
                          {st.notes && <p className="text-xs text-gray-400 dark:text-neutral-500 mt-0.5">{st.notes}</p>}
                          <p className="text-xs text-teal-600 dark:text-teal-400 mt-1 font-medium">{stSessions.length} sessions · {stHours.toFixed(1)}h total · ${(stHours * tutoring.rate).toFixed(0)} earned</p>
                        </div>
                        <div className="flex gap-1.5 flex-shrink-0">
                          <Btn variant="ghost" onClick={() => { setEditStudent(st); setStudentModal(true); }} cls="text-xs">Edit</Btn>
                          <Btn variant="danger" onClick={() => deleteStudent(st.id)} cls="text-xs">Del</Btn>
                        </div>
                      </div>
                    </Card>
                  );
                })}
                {students.length === 0 && <Card cls="py-12 text-center"><p className="text-sm text-gray-400 dark:text-neutral-500">No students added yet.</p></Card>}
              </div>
            </div>
          )}

          <Modal isOpen={sessionModal} onClose={() => setSessionModal(false)} title="Log a Session">
            {students.length > 0
              ? <SessionForm onSave={addSession} onCancel={() => setSessionModal(false)} />
              : <div className="text-center py-4"><p className="text-sm text-gray-500 dark:text-neutral-500 mb-4">Add a student first to log sessions.</p><Btn variant="primary" onClick={() => { setSessionModal(false); setStudentModal(true); }}>+ Add Student</Btn></div>
            }
          </Modal>

          <Modal isOpen={studentModal} onClose={() => { setStudentModal(false); setEditStudent(null); }} title={editStudent ? 'Edit Student' : 'Add Student'}>
            <StudentForm initial={editStudent} onSave={saveStudent} onCancel={() => { setStudentModal(false); setEditStudent(null); }} />
          </Modal>
        </div>
      );
    };

    // Keep placeholder to avoid breaking the file structure
    const TutoringForm = ({ onSave, onCancel }) => {
      const [form, setForm] = useState({ student: '', subject: '', date: '', duration: 1, notes: '', paid: false });
      return (
        <div className="space-y-3 text-sm">
          <Inp value={form.student} onChange={(e) => setForm({ ...form, student: e.target.value })} placeholder="Student name" />
          <Inp value={form.subject} onChange={(e) => setForm({ ...form, subject: e.target.value })} placeholder="Subject" />
          <Inp type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
          <Inp type="number" step="0.5" value={form.duration} onChange={(e) => setForm({ ...form, duration: Number(e.target.value) })} placeholder="Duration (hours)" />
          <Inp value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} placeholder="Notes" />
          <label className="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" checked={form.paid} onChange={(e) => setForm({ ...form, paid: e.target.checked })} className="accent-teal-500" />
            <span>Paid</span>
          </label>
          <div className="flex gap-2 mt-4">
            <Btn variant="primary" onClick={() => onSave(form)} cls="flex-1">Save</Btn>
            <Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn>
          </div>
        </div>
      );
    };

    // ==================== GYM TRACKER ====================
    const ProgressChart = ({ gym, exerciseFilter }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !gym.log || gym.log.length === 0) return;
        if (chartRef.current) chartRef.current.destroy();

        const log = [...gym.log].sort((a, b) => new Date(a.date) - new Date(b.date));
        const exerciseMap = {};
        log.forEach(session => {
          (session.entries || []).forEach(entry => {
            if (exerciseFilter && exerciseFilter !== 'all' && entry.exerciseName !== exerciseFilter) return;
            if (!exerciseMap[entry.exerciseName]) exerciseMap[entry.exerciseName] = [];
            const maxW = Math.max(...(entry.sets || []).map(s => Number(s.weight) || 0), 0);
            if (maxW > 0) exerciseMap[entry.exerciseName].push({ date: session.date, weight: maxW });
          });
        });

        const colors = ['#14b8a6','#3b82f6','#a855f7','#ec4899','#f59e0b','#ef4444','#22c55e','#6366f1','#f97316','#06b6d4'];
        const datasets = Object.entries(exerciseMap).slice(0, 10).map(([name, points], i) => ({
          label: name,
          data: points.map(p => ({ x: p.date, y: p.weight })),
          borderColor: colors[i % colors.length],
          backgroundColor: colors[i % colors.length] + '33',
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: false,
        }));

        if (datasets.length === 0) return;

        const isDark = document.documentElement.classList.contains('dark');
        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: { datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'nearest', intersect: false },
            plugins: {
              legend: { position: 'bottom', labels: { color: isDark ? '#d4d4d4' : '#374151', font: { size: 11 }, boxWidth: 12, padding: 15 } },
              tooltip: { backgroundColor: isDark ? '#262626' : '#fff', titleColor: isDark ? '#fafafa' : '#111', bodyColor: isDark ? '#d4d4d4' : '#374151', borderColor: isDark ? '#404040' : '#e5e7eb', borderWidth: 1 },
            },
            scales: {
              x: { type: 'category', title: { display: true, text: 'Date', color: isDark ? '#a3a3a3' : '#6b7280' }, ticks: { color: isDark ? '#a3a3a3' : '#6b7280', maxRotation: 45 }, grid: { color: isDark ? '#262626' : '#f3f4f6' } },
              y: { title: { display: true, text: 'Weight (kg)', color: isDark ? '#a3a3a3' : '#6b7280' }, ticks: { color: isDark ? '#a3a3a3' : '#6b7280' }, grid: { color: isDark ? '#262626' : '#f3f4f6' }, beginAtZero: false },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [gym.log, exerciseFilter]);

      return <canvas ref={canvasRef} />;
    };

    const GymPage = ({ gym, onUpdate }) => {
      const [tab, setTab] = useState('workout');
      const [selectedDay, setSelectedDay] = useState(gym.days[0]?.id || 1);
      const [editExercise, setEditExercise] = useState(null);
      const [editModal, setEditModal] = useState(false);
      const [addExModal, setAddExModal] = useState(false);
      const [editDayModal, setEditDayModal] = useState(false);
      const [addDayModal, setAddDayModal] = useState(false);
      const [activeSession, setActiveSession] = useState(null);
      const [sessionLocation, setSessionLocation] = useState(gym.locations[0] || 'Knox');
      const [chartFilter, setChartFilter] = useState('all');
      const [historyDayFilter, setHistoryDayFilter] = useState('all');
      const [locationModal, setLocationModal] = useState(false);
      const [newLocation, setNewLocation] = useState('');

      const day = gym.days.find(d => d.id === selectedDay) || gym.days[0];

      // Exercise CRUD
      const saveExercise = (form) => {
        const updated = { ...gym, days: gym.days.map(d => d.id !== selectedDay ? d : {
          ...d, exercises: editExercise
            ? d.exercises.map(e => e.id === editExercise.id ? { ...form, id: editExercise.id } : e)
            : [...d.exercises, { ...form, id: Math.max(0, ...d.exercises.map(e => e.id)) + 1 }]
        })};
        onUpdate(updated);
        setEditModal(false); setAddExModal(false); setEditExercise(null);
      };
      const deleteExercise = (exId) => {
        onUpdate({ ...gym, days: gym.days.map(d => d.id !== selectedDay ? d : { ...d, exercises: d.exercises.filter(e => e.id !== exId) }) });
      };
      const moveExercise = (exId, dir) => {
        const exs = [...day.exercises];
        const idx = exs.findIndex(e => e.id === exId);
        if ((dir === -1 && idx === 0) || (dir === 1 && idx === exs.length - 1)) return;
        [exs[idx], exs[idx + dir]] = [exs[idx + dir], exs[idx]];
        onUpdate({ ...gym, days: gym.days.map(d => d.id !== selectedDay ? d : { ...d, exercises: exs }) });
      };

      // Day CRUD
      const saveDay = (form) => {
        onUpdate({ ...gym, days: gym.days.map(d => d.id !== selectedDay ? d : { ...d, name: form.name, focus: form.focus }) });
        setEditDayModal(false);
      };
      const addDay = (form) => {
        const newId = Math.max(0, ...gym.days.map(d => d.id)) + 1;
        onUpdate({ ...gym, days: [...gym.days, { id: newId, name: form.name, focus: form.focus, exercises: [] }] });
        setSelectedDay(newId);
        setAddDayModal(false);
      };
      const deleteDay = (dayId) => {
        if (gym.days.length <= 1) return;
        const newDays = gym.days.filter(d => d.id !== dayId);
        onUpdate({ ...gym, days: newDays });
        setSelectedDay(newDays[0].id);
      };

      // Location CRUD
      const addLocation = () => {
        if (!newLocation.trim() || gym.locations.includes(newLocation.trim())) return;
        onUpdate({ ...gym, locations: [...gym.locations, newLocation.trim()] });
        setNewLocation('');
      };
      const removeLocation = (loc) => {
        onUpdate({ ...gym, locations: gym.locations.filter(l => l !== loc) });
      };

      // Session logging
      const startSession = () => {
        const entries = day.exercises.map(ex => ({
          exerciseId: ex.id, exerciseName: ex.name,
          sets: Array.from({ length: ex.sets }, () => ({ weight: ex.weight || 0, reps: ex.reps || 0 })),
        }));
        setActiveSession({ dayId: selectedDay, dayName: day.name, entries, startedAt: new Date().toISOString() });
      };

      const updateSessionSet = (entryIdx, setIdx, field, value) => {
        setActiveSession(prev => {
          const entries = [...prev.entries];
          const sets = [...entries[entryIdx].sets];
          sets[setIdx] = { ...sets[setIdx], [field]: value };
          entries[entryIdx] = { ...entries[entryIdx], sets };
          return { ...prev, entries };
        });
      };

      const addSetToEntry = (entryIdx) => {
        setActiveSession(prev => {
          const entries = [...prev.entries];
          const lastSet = entries[entryIdx].sets[entries[entryIdx].sets.length - 1] || { weight: 0, reps: 0 };
          entries[entryIdx] = { ...entries[entryIdx], sets: [...entries[entryIdx].sets, { ...lastSet }] };
          return { ...prev, entries };
        });
      };

      const removeSetFromEntry = (entryIdx, setIdx) => {
        setActiveSession(prev => {
          const entries = [...prev.entries];
          if (entries[entryIdx].sets.length <= 1) return prev;
          entries[entryIdx] = { ...entries[entryIdx], sets: entries[entryIdx].sets.filter((_, i) => i !== setIdx) };
          return { ...prev, entries };
        });
      };

      const finishSession = () => {
        const newLog = {
          id: Math.max(0, ...(gym.log || []).map(l => l.id)) + 1,
          date: new Date().toISOString().split('T')[0],
          dayId: activeSession.dayId,
          dayName: activeSession.dayName,
          location: sessionLocation,
          entries: activeSession.entries,
        };
        onUpdate({ ...gym, log: [...(gym.log || []), newLog] });
        setActiveSession(null);
      };

      const deleteLogEntry = (logId) => {
        onUpdate({ ...gym, log: (gym.log || []).filter(l => l.id !== logId) });
      };

      // Helpers
      const allExerciseNames = [...new Set((gym.log || []).flatMap(s => s.entries.map(e => e.exerciseName)))];
      const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
      const filteredLog = (gym.log || []).filter(l => historyDayFilter === 'all' || l.dayId === Number(historyDayFilter)).sort((a, b) => new Date(b.date) - new Date(a.date));

      // Personal Records
      const getPRs = () => {
        const prs = {};
        (gym.log || []).forEach(session => {
          (session.entries || []).forEach(entry => {
            const maxW = Math.max(...(entry.sets || []).map(s => Number(s.weight) || 0), 0);
            if (!prs[entry.exerciseName] || maxW > prs[entry.exerciseName].weight) {
              prs[entry.exerciseName] = { weight: maxW, date: session.date };
            }
          });
        });
        return Object.entries(prs).filter(([_, v]) => v.weight > 0).sort((a, b) => b[1].weight - a[1].weight);
      };

      // Exercise Form
      const ExForm = ({ initial, onSave, onCancel }) => {
        const [f, setF] = useState(initial || { name: '', sets: 3, reps: 8, weight: 0, unit: 'kg', notes: '', link: '' });
        return (
          <div className="space-y-3 text-sm">
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Exercise Name *</label><Inp value={f.name} onChange={e => setF({...f, name: e.target.value})} placeholder="e.g. Bench Press" /></div>
            <div className="grid grid-cols-3 gap-3">
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Sets</label><Inp type="number" min="1" value={f.sets} onChange={e => setF({...f, sets: Number(e.target.value)})} /></div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Reps (0 = failure)</label><Inp type="number" min="0" value={f.reps} onChange={e => setF({...f, reps: Number(e.target.value)})} /></div>
              <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Weight ({f.unit})</label><Inp type="number" step="0.5" min="0" value={f.weight} onChange={e => setF({...f, weight: Number(e.target.value)})} /></div>
            </div>
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Unit</label>
              <Sel value={f.unit} onChange={e => setF({...f, unit: e.target.value})}><option value="kg">kg</option><option value="lbs">lbs</option><option value="bw">Bodyweight</option></Sel>
            </div>
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Notes</label><Inp value={f.notes} onChange={e => setF({...f, notes: e.target.value})} placeholder="Weight notes, form cues..." /></div>
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Video Link</label><Inp value={f.link} onChange={e => setF({...f, link: e.target.value})} placeholder="https://youtube.com/..." /></div>
            <div className="flex gap-2 pt-1"><Btn variant="primary" onClick={() => { if (f.name.trim()) onSave(f); }} cls="flex-1">Save</Btn><Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn></div>
          </div>
        );
      };

      // Day Form
      const DayForm = ({ initial, onSave, onCancel, title }) => {
        const [f, setF] = useState(initial || { name: '', focus: '' });
        return (
          <div className="space-y-3 text-sm">
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Day Name</label><Inp value={f.name} onChange={e => setF({...f, name: e.target.value})} placeholder="e.g. Day 5" /></div>
            <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Focus / Muscle Groups</label><Inp value={f.focus} onChange={e => setF({...f, focus: e.target.value})} placeholder="e.g. Arms & Abs" /></div>
            <div className="flex gap-2 pt-1"><Btn variant="primary" onClick={() => { if (f.name.trim()) onSave(f); }} cls="flex-1">Save</Btn><Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn></div>
          </div>
        );
      };

      return (
        <div className="fade-in">
          <div className="flex items-start justify-between mb-5">
            <div>
              <h1 className="text-2xl font-bold">Gym Tracker</h1>
              <p className="text-sm text-gray-500 dark:text-neutral-500 mt-0.5">{gym.days.length} workout days · {(gym.log || []).length} sessions logged</p>
            </div>
            <div className="flex gap-2">
              <Btn variant="secondary" onClick={() => setLocationModal(true)}>📍 Gyms</Btn>
              <Btn variant="secondary" onClick={() => setAddDayModal(true)}>+ Day</Btn>
            </div>
          </div>

          {/* Main tabs */}
          <div className="flex gap-1.5 mb-5 p-1.5 bg-gray-100 dark:bg-neutral-900 rounded-xl w-fit">
            {[['workout','Workout'],['log','Log Session'],['history','History'],['progress','Progress'],['prs','PRs']].map(([id,label]) => (
              <button key={id} onClick={() => setTab(id)} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===id ? 'bg-white dark:bg-neutral-800 shadow-sm text-teal-600 dark:text-teal-400' : 'text-gray-500 dark:text-neutral-500 hover:text-gray-700 dark:hover:text-neutral-300'}`}>{label}</button>
            ))}
          </div>

          {/* ===== WORKOUT TAB ===== */}
          {tab === 'workout' && (
            <div>
              {/* Day selector */}
              <div className="flex gap-2 mb-4 flex-wrap">
                {gym.days.map(d => (
                  <button key={d.id} onClick={() => setSelectedDay(d.id)}
                    className={`px-4 py-2.5 rounded-xl text-sm font-medium transition-all border ${selectedDay === d.id ? 'bg-teal-500 text-white border-teal-500' : 'bg-white dark:bg-neutral-950 border-gray-200 dark:border-neutral-800 text-gray-700 dark:text-neutral-300 hover:border-teal-300 dark:hover:border-teal-700'}`}>
                    <span className="font-bold">{d.name}</span>
                    <span className="block text-xs opacity-80 mt-0.5">{d.focus}</span>
                  </button>
                ))}
              </div>

              {/* Day header */}
              <div className="flex items-center justify-between mb-4">
                <div>
                  <h2 className="text-lg font-bold">{day.name} — {day.focus}</h2>
                  <p className="text-xs text-gray-400 dark:text-neutral-500">{day.exercises.length} exercises</p>
                </div>
                <div className="flex gap-2">
                  <Btn variant="ghost" onClick={() => setEditDayModal(true)} cls="text-xs">Edit Day</Btn>
                  {gym.days.length > 1 && <Btn variant="danger" onClick={() => deleteDay(day.id)} cls="text-xs">Delete Day</Btn>}
                </div>
              </div>

              {/* Exercise list */}
              <div className="space-y-2">
                {day.exercises.map((ex, idx) => (
                  <Card key={ex.id} cls="group">
                    <div className="flex items-start gap-3">
                      <div className="flex flex-col gap-1 pt-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onClick={() => moveExercise(ex.id, -1)} className="text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300 text-xs leading-none">▲</button>
                        <button onClick={() => moveExercise(ex.id, 1)} className="text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300 text-xs leading-none">▼</button>
                      </div>
                      <div className="w-8 h-8 rounded-lg bg-teal-500/10 flex items-center justify-center text-teal-600 dark:text-teal-400 font-bold text-sm flex-shrink-0">{idx + 1}</div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <h4 className="font-semibold text-sm text-gray-800 dark:text-neutral-200">{ex.name}</h4>
                          {ex.link && <a href={ex.link} target="_blank" rel="noopener noreferrer" className="text-teal-500 hover:text-teal-600 text-xs flex-shrink-0">▶ Video</a>}
                        </div>
                        <div className="flex gap-3 mt-1 text-xs text-gray-500 dark:text-neutral-500">
                          <span>{ex.sets} sets</span>
                          <span>{ex.reps > 0 ? `${ex.reps} reps` : 'To failure'}</span>
                          <span className="font-semibold text-gray-700 dark:text-neutral-300">{ex.unit === 'bw' ? 'Bodyweight' : `${ex.weight} ${ex.unit}`}</span>
                        </div>
                        {ex.notes && <p className="text-xs text-gray-400 dark:text-neutral-600 mt-1 italic">{ex.notes}</p>}
                      </div>
                      <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                        <button onClick={() => { setEditExercise(ex); setEditModal(true); }} className="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300 px-1.5 py-0.5 rounded hover:bg-gray-100 dark:hover:bg-neutral-800">Edit</button>
                        <button onClick={() => deleteExercise(ex.id)} className="text-xs text-red-400 hover:text-red-600 px-1.5 py-0.5 rounded hover:bg-red-50 dark:hover:bg-red-900/20">Del</button>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
              <Btn variant="secondary" onClick={() => { setEditExercise(null); setAddExModal(true); }} cls="mt-3 w-full">+ Add Exercise</Btn>
            </div>
          )}

          {/* ===== LOG SESSION TAB ===== */}
          {tab === 'log' && (
            <div>
              {!activeSession ? (
                <div>
                  <Card cls="mb-4">
                    <h3 className="font-semibold text-sm mb-3">Start a Workout</h3>
                    <div className="grid grid-cols-2 gap-3 mb-4">
                      <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Workout Day</label>
                        <Sel value={selectedDay} onChange={e => setSelectedDay(Number(e.target.value))}>
                          {gym.days.map(d => <option key={d.id} value={d.id}>{d.name} — {d.focus}</option>)}
                        </Sel>
                      </div>
                      <div><label className="text-xs font-semibold text-gray-600 dark:text-neutral-400 block mb-1">Gym Location</label>
                        <Sel value={sessionLocation} onChange={e => setSessionLocation(e.target.value)}>
                          {gym.locations.map(l => <option key={l} value={l}>{l}</option>)}
                        </Sel>
                      </div>
                    </div>
                    <Btn variant="primary" onClick={startSession} cls="w-full text-base py-3">Start {day.name} — {day.focus}</Btn>
                  </Card>
                  <div className="text-center py-8 text-gray-400 dark:text-neutral-500">
                    <p className="text-3xl mb-2">🏋️</p>
                    <p className="text-sm">Select a day and gym, then hit start to begin logging sets.</p>
                  </div>
                </div>
              ) : (
                <div>
                  <div className="flex items-center justify-between mb-4">
                    <div>
                      <h3 className="font-bold text-lg text-teal-600 dark:text-teal-400">🏋️ {activeSession.dayName} — Live</h3>
                      <p className="text-xs text-gray-400 dark:text-neutral-500">📍 {sessionLocation} · Tap each set to log weight & reps</p>
                    </div>
                    <div className="flex gap-2">
                      <Btn variant="danger" onClick={() => setActiveSession(null)} cls="text-xs">Cancel</Btn>
                      <Btn variant="primary" onClick={finishSession}>Finish & Save</Btn>
                    </div>
                  </div>
                  <div className="space-y-3">
                    {activeSession.entries.map((entry, ei) => (
                      <Card key={ei}>
                        <div className="flex items-center justify-between mb-2">
                          <h4 className="font-semibold text-sm">{entry.exerciseName}</h4>
                          <button onClick={() => addSetToEntry(ei)} className="text-xs text-teal-500 hover:text-teal-600 font-medium">+ Set</button>
                        </div>
                        <div className="space-y-1.5">
                          {entry.sets.map((set, si) => (
                            <div key={si} className="flex items-center gap-2 bg-gray-50 dark:bg-neutral-900 rounded-lg p-2">
                              <span className="text-xs font-bold text-gray-400 dark:text-neutral-600 w-6 text-center">S{si + 1}</span>
                              <div className="flex-1 grid grid-cols-2 gap-2">
                                <div className="flex items-center gap-1">
                                  <input type="number" step="0.5" min="0" value={set.weight} onChange={e => updateSessionSet(ei, si, 'weight', e.target.value)}
                                    className="w-full px-2 py-1.5 rounded border border-gray-200 dark:border-neutral-700 bg-white dark:bg-neutral-800 text-gray-900 dark:text-neutral-50 text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none" />
                                  <span className="text-xs text-gray-400 flex-shrink-0">kg</span>
                                </div>
                                <div className="flex items-center gap-1">
                                  <input type="number" min="0" value={set.reps} onChange={e => updateSessionSet(ei, si, 'reps', e.target.value)}
                                    className="w-full px-2 py-1.5 rounded border border-gray-200 dark:border-neutral-700 bg-white dark:bg-neutral-800 text-gray-900 dark:text-neutral-50 text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none" />
                                  <span className="text-xs text-gray-400 flex-shrink-0">reps</span>
                                </div>
                              </div>
                              {entry.sets.length > 1 && <button onClick={() => removeSetFromEntry(ei, si)} className="text-red-400 hover:text-red-600 text-xs px-1">✕</button>}
                            </div>
                          ))}
                        </div>
                      </Card>
                    ))}
                  </div>
                  <Btn variant="primary" onClick={finishSession} cls="w-full mt-4 text-base py-3">Finish & Save Session</Btn>
                </div>
              )}
            </div>
          )}

          {/* ===== HISTORY TAB ===== */}
          {tab === 'history' && (
            <div>
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-semibold">Session History</h3>
                <Sel value={historyDayFilter} onChange={e => setHistoryDayFilter(e.target.value)} cls="w-48">
                  <option value="all">All Days</option>
                  {gym.days.map(d => <option key={d.id} value={d.id}>{d.name} — {d.focus}</option>)}
                </Sel>
              </div>
              {filteredLog.length === 0 ? (
                <Card cls="py-12 text-center"><p className="text-sm text-gray-400 dark:text-neutral-500">No sessions logged yet. Start a workout to begin tracking.</p></Card>
              ) : filteredLog.map(session => (
                <Card key={session.id} cls="mb-3">
                  <div className="flex items-start justify-between mb-3">
                    <div>
                      <h4 className="font-bold text-sm">{session.dayName}</h4>
                      <p className="text-xs text-gray-500 dark:text-neutral-500">{fmtDate(session.date)} · 📍 {session.location}</p>
                    </div>
                    <button onClick={() => deleteLogEntry(session.id)} className="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 dark:hover:bg-red-900/20">Delete</button>
                  </div>
                  <div className="space-y-1">
                    {session.entries.map((entry, i) => (
                      <div key={i} className="text-xs bg-gray-50 dark:bg-neutral-900 rounded-lg p-2">
                        <span className="font-semibold text-gray-700 dark:text-neutral-300">{entry.exerciseName}</span>
                        <span className="text-gray-400 dark:text-neutral-500 ml-2">
                          {entry.sets.map((s, j) => `${s.weight}kg×${s.reps}`).join(' · ')}
                        </span>
                      </div>
                    ))}
                  </div>
                </Card>
              ))}
            </div>
          )}

          {/* ===== PROGRESS TAB ===== */}
          {tab === 'progress' && (
            <div>
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-semibold">Strength Progress</h3>
                <Sel value={chartFilter} onChange={e => setChartFilter(e.target.value)} cls="w-64">
                  <option value="all">All Exercises</option>
                  {allExerciseNames.map(n => <option key={n} value={n}>{n}</option>)}
                </Sel>
              </div>
              {(gym.log || []).length === 0 ? (
                <Card cls="py-16 text-center">
                  <p className="text-3xl mb-2">📈</p>
                  <p className="text-sm text-gray-400 dark:text-neutral-500">Log some sessions first to see your progress graph.</p>
                </Card>
              ) : (
                <Card cls="p-4">
                  <div style={{ height: '400px' }}>
                    <ProgressChart gym={gym} exerciseFilter={chartFilter} />
                  </div>
                </Card>
              )}
            </div>
          )}

          {/* ===== PRs TAB ===== */}
          {tab === 'prs' && (
            <div>
              <h3 className="font-semibold mb-4">Personal Records</h3>
              {getPRs().length === 0 ? (
                <Card cls="py-12 text-center"><p className="text-sm text-gray-400 dark:text-neutral-500">No PRs yet. Log sessions to track your records.</p></Card>
              ) : (
                <div className="space-y-2">
                  {getPRs().map(([name, pr], i) => (
                    <Card key={name} cls="flex items-center gap-4">
                      <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-sm flex-shrink-0 ${i === 0 ? 'bg-amber-400' : i === 1 ? 'bg-gray-400' : i === 2 ? 'bg-amber-700' : 'bg-gray-200 dark:bg-neutral-800 text-gray-500 dark:text-neutral-500'}`}>
                        {i < 3 ? ['🥇','🥈','🥉'][i] : i + 1}
                      </div>
                      <div className="flex-1">
                        <p className="font-semibold text-sm text-gray-800 dark:text-neutral-200">{name}</p>
                        <p className="text-xs text-gray-400 dark:text-neutral-500">{fmtDate(pr.date)}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-xl font-bold text-teal-600 dark:text-teal-400">{pr.weight}<span className="text-sm font-medium text-gray-400 ml-0.5">kg</span></p>
                      </div>
                    </Card>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Modals */}
          <Modal isOpen={editModal} onClose={() => { setEditModal(false); setEditExercise(null); }} title="Edit Exercise">
            <ExForm initial={editExercise} onSave={saveExercise} onCancel={() => { setEditModal(false); setEditExercise(null); }} />
          </Modal>
          <Modal isOpen={addExModal} onClose={() => setAddExModal(false)} title="Add Exercise">
            <ExForm initial={null} onSave={saveExercise} onCancel={() => setAddExModal(false)} />
          </Modal>
          <Modal isOpen={editDayModal} onClose={() => setEditDayModal(false)} title="Edit Day">
            <DayForm initial={{ name: day.name, focus: day.focus }} onSave={saveDay} onCancel={() => setEditDayModal(false)} />
          </Modal>
          <Modal isOpen={addDayModal} onClose={() => setAddDayModal(false)} title="Add Workout Day">
            <DayForm initial={null} onSave={addDay} onCancel={() => setAddDayModal(false)} />
          </Modal>
          <Modal isOpen={locationModal} onClose={() => setLocationModal(false)} title="Manage Gyms">
            <div className="space-y-3 text-sm">
              {gym.locations.map(loc => (
                <div key={loc} className="flex items-center justify-between p-2 bg-gray-50 dark:bg-neutral-900 rounded-lg">
                  <span className="font-medium">📍 {loc}</span>
                  <button onClick={() => removeLocation(loc)} className="text-xs text-red-400 hover:text-red-600">Remove</button>
                </div>
              ))}
              <div className="flex gap-2">
                <Inp value={newLocation} onChange={e => setNewLocation(e.target.value)} placeholder="New gym name" />
                <Btn variant="primary" onClick={addLocation}>Add</Btn>
              </div>
            </div>
          </Modal>
        </div>
      );
    };

    const QuickLinksPage = ({ links, onUpdate }) => {
      const [modalOpen, setModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);

      const handleSave = (l) => {
        if (editId) {
          onUpdate(links.map(x => x.id === editId ? { ...l, id: editId } : x));
        } else {
          onUpdate([...links, { ...l, id: Math.max(...links.map(x => x.id), 0) + 1 }]);
        }
        setModalOpen(false);
        setEditId(null);
      };

      const handleDelete = (id) => {
        onUpdate(links.filter(l => l.id !== id));
      };

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold">Quick Links</h1>
            <Btn variant="primary" onClick={() => { setEditId(null); setModalOpen(true); }}>+ Add Link</Btn>
          </div>
          <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 mb-6">
            {links.map(l => (
              <div key={l.id} className="group relative">
                <a href={l.url} target="_blank" rel="noopener noreferrer"
                  className="flex flex-col items-center justify-center gap-2 p-3.5 bg-white dark:bg-neutral-950 rounded-xl border border-gray-200 dark:border-neutral-800 hover:border-teal-300 dark:hover:border-teal-700 hover:shadow-sm transition-all text-center w-full h-full min-h-[80px]">
                  <span className="text-2xl">{l.emoji}</span>
                  <span className="text-xs font-medium text-gray-700 dark:text-neutral-300 truncate w-full text-center">{l.name}</span>
                </a>
                <div className="absolute top-1 right-1 opacity-0 group-hover:opacity-100 flex gap-0.5 transition-opacity z-10">
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setEditId(l.id); setModalOpen(true); }} className="w-5 h-5 bg-white dark:bg-neutral-800 rounded border border-gray-200 dark:border-neutral-700 text-[10px] flex items-center justify-center text-gray-500 hover:text-gray-700 shadow-sm">✏️</button>
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleDelete(l.id); }} className="w-5 h-5 bg-white dark:bg-neutral-800 rounded border border-gray-200 dark:border-neutral-700 text-[10px] flex items-center justify-center text-red-400 hover:text-red-600 shadow-sm">✕</button>
                </div>
              </div>
            ))}
            <button onClick={() => { setEditId(null); setModalOpen(true); }}
              className="flex flex-col items-center gap-2 p-3.5 rounded-xl border-2 border-dashed border-gray-200 dark:border-neutral-700 hover:border-teal-400 dark:hover:border-teal-600 text-gray-400 hover:text-teal-500 transition-all">
              <span className="text-2xl">+</span>
              <span className="text-xs font-medium">Add</span>
            </button>
          </div>

          <Modal isOpen={modalOpen} onClose={() => { setModalOpen(false); setEditId(null); }} title={editId ? 'Edit Link' : 'Add Link'}>
            <LinkForm link={editId ? links.find(l => l.id === editId) : null} onSave={handleSave} onCancel={() => { setModalOpen(false); setEditId(null); }} />
          </Modal>
        </div>
      );
    };

    const LinkForm = ({ link, onSave, onCancel }) => {
      const [form, setForm] = useState(link || { name: '', url: '', emoji: '🔗' });

      return (
        <div className="space-y-3 text-sm">
          <Inp value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="Link name" />
          <Inp value={form.url} onChange={(e) => setForm({ ...form, url: e.target.value })} placeholder="URL" />
          <Inp value={form.emoji} onChange={(e) => setForm({ ...form, emoji: e.target.value })} placeholder="Emoji" />
          <div className="flex gap-2 mt-4">
            <Btn variant="primary" onClick={() => onSave(form)} cls="flex-1">Save</Btn>
            <Btn variant="secondary" onClick={onCancel} cls="flex-1">Cancel</Btn>
          </div>
        </div>
      );
    };

    const PomodoroPage = () => {
      const [time, setTime] = useState(25 * 60);
      const [isRunning, setIsRunning] = useState(false);
      const [workTime, setWorkTime] = useState(25);
      const [breakTime, setBreakTime] = useState(5);
      const [isWork, setIsWork] = useState(true);

      useEffect(() => {
        let interval;
        if (isRunning && time > 0) {
          interval = setInterval(() => setTime(t => t - 1), 1000);
        } else if (time === 0 && isRunning) {
          setIsWork(!isWork);
          setTime((isWork ? breakTime : workTime) * 60);
        }
        return () => clearInterval(interval);
      }, [isRunning, time, isWork, workTime, breakTime]);

      const minutes = Math.floor(time / 60);
      const seconds = time % 60;

      return (
        <div className="fade-in">
          <PageHead>Pomodoro Timer</PageHead>
          <Card cls="text-center">
            <div className="text-sm text-gray-600 dark:text-neutral-400 mb-4">{isWork ? 'Work Session' : 'Break Time'}</div>
            <div className="text-8xl font-bold text-teal-600 dark:text-teal-400 mb-6 font-mono">
              {String(minutes).padStart(2, '0')}:{String(seconds).padStart(2, '0')}
            </div>
            <div className="flex gap-4 justify-center mb-8">
              <Btn variant="primary" onClick={() => setIsRunning(!isRunning)}>
                {isRunning ? 'Pause' : 'Start'}
              </Btn>
              <Btn variant="secondary" onClick={() => { setIsRunning(false); setTime(isWork ? workTime * 60 : breakTime * 60); }}>
                Reset
              </Btn>
            </div>

            <div className="grid grid-cols-2 gap-4 text-left">
              <div>
                <label className="text-sm font-semibold dark:text-neutral-300 block mb-2">Work Duration (min)</label>
                <Inp type="number" value={workTime} onChange={(e) => { setWorkTime(Number(e.target.value)); if (isWork) setTime(Number(e.target.value) * 60); }} disabled={isRunning} />
              </div>
              <div>
                <label className="text-sm font-semibold dark:text-neutral-300 block mb-2">Break Duration (min)</label>
                <Inp type="number" value={breakTime} onChange={(e) => { setBreakTime(Number(e.target.value)); if (!isWork) setTime(Number(e.target.value) * 60); }} disabled={isRunning} />
              </div>
            </div>
          </Card>
        </div>
      );
    };

    // ==================== MAIN APP ====================
    const App = () => {
      const [dark, setDark] = useState(getItem('hub_dark', false));
      const [page, setPage] = useState('overview');
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const [subjects, setSubjects] = useState(getItem('hub_subjects', DEF_SUBJECTS));
      const [assignments, setAssignments] = useState(getItem('hub_assignments', DEF_ASSIGNMENTS));
      const [tasks, setTasks] = useState(getItem('hub_tasks', DEF_TASKS));
      const [links, setLinks] = useState(getItem('hub_links', DEF_LINKS));
      const [otunes, setOtunes] = useState(getItem('hub_otunes', DEF_OTUNES));
      const [tutoring, setTutoring] = useState(getItem('hub_tutoring', DEF_TUTORING));
      const [settings, setSettings] = useState(getItem('hub_settings', DEF_SETTINGS));
      const [gym, setGym] = useState(getItem('hub_gym', DEF_GYM));

      useEffect(() => {
        setItem('hub_dark', dark);
        document.documentElement.classList.toggle('dark', dark);
      }, [dark]);

      useEffect(() => { setItem('hub_subjects', subjects); }, [subjects]);
      useEffect(() => { setItem('hub_assignments', assignments); }, [assignments]);
      useEffect(() => { setItem('hub_tasks', tasks); }, [tasks]);
      useEffect(() => { setItem('hub_links', links); }, [links]);
      useEffect(() => { setItem('hub_otunes', otunes); }, [otunes]);
      useEffect(() => { setItem('hub_tutoring', tutoring); }, [tutoring]);
      useEffect(() => { setItem('hub_settings', settings); }, [settings]);
      useEffect(() => { setItem('hub_gym', gym); }, [gym]);

      const nav = [
        { icon: '🏠', label: 'Overview', page: 'overview' },
        { icon: '📅', label: 'Calendar', page: 'calendar' },
        { icon: '📚', label: 'Subjects', page: 'subjects' },
        { icon: '📋', label: 'Assignments', page: 'assignments' },
        { icon: '✅', label: 'To-Do', page: 'todo' },
        { icon: '🎵', label: 'oTunes Board', page: 'otunes' },
        { icon: '👨‍🏫', label: 'Tutoring', page: 'tutoring' },
        { icon: '💪', label: 'Gym', page: 'gym' },
        { icon: '🔗', label: 'Quick Links', page: 'links' },
        { icon: '⏱️', label: 'Pomodoro', page: 'pomodoro' },
      ];

      return (
        <div className={`min-h-screen ${dark ? 'dark' : ''}`}>
          <div className="flex h-screen app-bg">
            {/* Sidebar */}
            <div className={`app-sidebar sidebar-hover-group fixed inset-y-0 left-0 flex flex-col transition-all z-40 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 lg:static`}
              style={{ padding: '20px 8px' }}>
              {/* Logo */}
              <div className="flex items-center gap-3 mb-7" style={{ paddingLeft: '4px' }}>
                <div className="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center text-white font-bold text-base" style={{background: 'linear-gradient(135deg, #0d9488 0%, #0891b2 100%)'}}>
                  D
                </div>
                <div className="sidebar-header-text">
                  <div className="font-bold text-base tracking-tight" style={{whiteSpace:'nowrap'}}>Dashboard</div>
                  <div className="text-xs text-gray-400 dark:text-neutral-500 font-medium">Karthik</div>
                </div>
              </div>

              <nav className="flex-1 space-y-0.5">
                {nav.map(n => (
                  <button key={n.page} onClick={() => { setPage(n.page); setSidebarOpen(false); }}
                    className={`nav-item-hover w-full text-left py-2.5 rounded-lg transition-all text-sm flex items-center gap-3 ${
                      page === n.page ? 'nav-item-active' : 'text-gray-500 dark:text-neutral-400'
                    }`}
                    style={{ paddingLeft: '8px', paddingRight: '8px' }}>
                    <span className="nav-item-icon text-base w-5 text-center flex-shrink-0">{n.icon}</span>
                    <span className={`sidebar-label ${page === n.page ? 'font-semibold' : 'font-normal'}`}>{n.label}</span>
                  </button>
                ))}
              </nav>

              {/* Theme toggle — visible on hover */}
              <button onClick={() => setDark(!dark)}
                className="sidebar-toggle-btn w-full flex items-center justify-center gap-2 py-2.5 rounded-xl border text-sm font-medium transition-all"
                style={dark
                  ? { background: 'rgba(255,255,255,0.06)', borderColor: '#3d3d3d', color: '#a0a0a0' }
                  : { background: '#F5F4F0', borderColor: '#E4E2DB', color: '#6b7280' }
                }>
                <span>{dark ? '☀️' : '🌙'}</span>
                <span>{dark ? 'Light Mode' : 'Dark Mode'}</span>
              </button>
            </div>

            {/* Main */}
            <div className="flex-1 flex flex-col overflow-hidden">
              <div className="lg:hidden app-sidebar border-b p-4">
                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="text-2xl text-gray-500">☰</button>
              </div>
              {sidebarOpen && <div className="lg:hidden fixed inset-0 bg-black bg-opacity-50 z-30" onClick={() => setSidebarOpen(false)}></div>}

              <div className="flex-1 overflow-auto p-6 lg:p-8">
                {page === 'overview' && <OverviewPage dark={dark} subjects={subjects} assignments={assignments} tasks={tasks} settings={settings} onSettingsChange={setSettings} />}
                {page === 'calendar' && <CalendarPage assignments={assignments} tasks={tasks} tutoring={tutoring} />}
                {page === 'subjects' && <SubjectsPage subjects={subjects} onUpdate={setSubjects} />}
                {page === 'assignments' && <AssignmentsPage assignments={assignments} subjects={subjects} onUpdate={setAssignments} />}
                {page === 'todo' && <TodoPage tasks={tasks} onUpdate={setTasks} />}
                {page === 'otunes' && <OTunesPage otunes={otunes} onUpdate={setOtunes} />}
                {page === 'tutoring' && <TutoringPage tutoring={tutoring} onUpdate={setTutoring} />}
                {page === 'gym' && <GymPage gym={gym} onUpdate={setGym} />}
                {page === 'links' && <QuickLinksPage links={links} onUpdate={setLinks} />}
                {page === 'pomodoro' && <PomodoroPage />}
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
